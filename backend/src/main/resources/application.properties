spring.application.name=grafik-generator
server.port=${SERVER_PORT:8081}
# Konfiguracja połączenia z PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/springappdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:springuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:springpassword}
spring.datasource.driver-className=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

gemini.api-key=${GEMINI_API_KEY:${GOOGLE_API_KEY:}}
gemini.model=${GEMINI_MODEL:gemini-3.5-flash}
gemini.max-output-tokens=${GEMINI_MAX_OUTPUT_TOKENS:65536}

# Konfiguracja OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
